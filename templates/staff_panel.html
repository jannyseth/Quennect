<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

:root{
    --dark-blue:#0B0F6D;
    --blue:#264A96;
    --teal:#4D8E79;
    --green:#59B438;
}

body{
    background:#dcdcdc;
    padding:40px;
}

h1{
    margin-bottom:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card h3{
    color:#777;
    margin-bottom:10px;
}

.card p{
    font-size:40px;
    font-weight:700;
}

.blue{color:var(--blue);}
.green{color:var(--green);}
.teal{color:var(--teal);}
.dark{color:var(--dark-blue);}

.box{
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    margin-bottom:30px;
}

.box h2{
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#f4f4f4;
    margin-bottom:15px;
}

button{
    padding:15px 20px;
    border:none;
    border-radius:15px;
    background:linear-gradient(
        135deg,
        var(--green),
        var(--teal)
    );
    color:white;
    font-weight:600;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:linear-gradient(
        135deg,
        var(--dark-blue),
        var(--blue)
    );
    color:white;
}

th,td{
    padding:15px;
    text-align:left;
}

td{
    border-bottom:1px solid #eee;
}

.status{
    padding:8px 14px;
    border-radius:30px;
    color:white;
    font-size:13px;
    font-weight:600;
}

.pending{
    background:orange;
}

.calling{
    background:#264A96;
}

.done{
    background:#59B438;
}

.delete-btn{
    background:#ff4d4d;
}

</style>
</head>
<body>

<h1>Staff Queue Management</h1>

<div class="cards">

    <div class="card">
        <h3>Total Queue</h3>
        <p class="blue" id="totalQueue">0</p>
    </div>

    <div class="card">
        <h3>Pending</h3>
        <p class="green" id="pendingCount">0</p>
    </div>

    <div class="card">
        <h3>Calling</h3>
        <p class="teal" id="callingCount">0</p>
    </div>

    <div class="card">
        <h3>Done</h3>
        <p class="dark" id="doneCount">0</p>
    </div>

</div>

<div class="box">

    <h2>Add Queue</h2>

    <input
        type="text"
        id="queueNumber"
        placeholder="A-001">

    <select id="queueStatus">
        <option>Pending</option>
        <option>Calling</option>
        <option>Done</option>
    </select>

    <button onclick="addQueue()">
        Add Queue
    </button>

</div>

<div class="box">

    <h2>Queue Records</h2>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Queue Number</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="queueTableBody">

        </tbody>

    </table>

</div>

<script>

let queueData = [];

async function deleteQueue(index){

    await fetch(`/delete_queue/${index}`,{
        method:"DELETE"
    });

    loadQueues();
}

function addQueue(){

    const queueNumber =
        document.getElementById("queueNumber").value;

    const queueStatus =
        document.getElementById("queueStatus").value;

    if(queueNumber === ""){
        alert("Enter Queue Number");
        return;
    }

    fetch('/add_queue', {
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            number:queueNumber,
            status:queueStatus
        })
    })
    .then(response => response.json())
    .then(data => {

        console.log(data);

        loadQueues();

        document.getElementById("queueNumber").value = "";

    })
    .catch(error => {
        console.error(error);
    });

}

function renderTable(){

    const body =
        document.getElementById("queueTableBody");

    body.innerHTML="";

    let pending=0;
    let calling=0;
    let done=0;

    queueData.forEach((item,index)=>{

        if(item.status==="Pending") pending++;
        if(item.status==="Calling") calling++;
        if(item.status==="Done") done++;

        body.innerHTML += `
        <tr>

            <td>${index+1}</td>

            <td>${item.number}</td>

            <td>
                <span class="status ${item.status.toLowerCase()}">
                    ${item.status}
                </span>
            </td>

            <td>
                <button
                class="delete-btn"
                onclick="deleteQueue(${index})">
                    Delete
                </button>
            </td>

        </tr>
        `;
    });

    document.getElementById("totalQueue").innerText =
        queueData.length;

    document.getElementById("pendingCount").innerText =
        pending;

    document.getElementById("callingCount").innerText =
        calling;

    document.getElementById("doneCount").innerText =
        done;
}

async function loadQueues(){

    const response =
        await fetch('/get_queue');

    const queues =
        await response.json();

    const tableBody =
        document.getElementById("queueTableBody");

    tableBody.innerHTML = "";

    let pending = 0;
    let calling = 0;
    let done = 0;

    queues.forEach((queue,index)=>{

        let cssClass = "pending";

        if(queue.status === "Calling"){
            cssClass = "calling";
            calling++;
        }
        else if(queue.status === "Done"){
            cssClass = "done";
            done++;
        }
        else{
            pending++;
        }

        tableBody.innerHTML += `
        <tr>

            <td>${index + 1}</td>

            <td>${queue.number}</td>

            <td>
                <span class="status ${cssClass}">
                    ${queue.status}
                </span>
            </td>

            <td>
                <button
                    class="delete-btn"
                    onclick="deleteQueue(${index})">
                    Delete
                </button>
            </td>

        </tr>
        `;
    });

    document.getElementById("totalQueue").innerText =
        queues.length;

    document.getElementById("pendingCount").innerText =
        pending;

    document.getElementById("callingCount").innerText =
        calling;

    document.getElementById("doneCount").innerText =
        done;
}

loadQueues();

setInterval(loadQueues,2000);

</script>

</body>
</html>
