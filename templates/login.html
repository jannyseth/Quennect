<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quennect</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Inter, Arial, Helvetica, sans-serif;
        }

        .back-home{
            position:absolute;
            top:24px;
            left:24px;
            text-decoration:none;
            color:#cc3333;
            font-weight:700;
            background:rgba(255,255,255,0.92);
            padding:10px 16px;
            border-radius:16px;
            box-shadow:0 16px 40px rgba(0,0,0,0.08);
            transition:transform .2s ease, color .2s ease;
            z-index:10;
        }

        .back-home:hover{
            transform:translateX(-4px);
            color:#0055aa;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f7ff;
            color:#0f172a;
        }

        .page-wrapper{
            width:min(95%, 980px);
            min-height:640px;
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:0;
            border-radius:32px;
            overflow:hidden;
            background:#ffffff;
            box-shadow:0 28px 80px rgba(0, 51, 103, 0.14);
        }

        .hero-panel{
            padding:56px 48px;
            background:linear-gradient(135deg, #cc3333 0%, #003367 100%);
            color:#ffffff;
            display:flex;
            flex-direction:column;
            justify-content:center;
            position:relative;
            overflow:hidden;
        }

        .hero-panel::before,
        .hero-panel::after{
            content:'';
            position:absolute;
            border-radius:999px;
            opacity:.25;
        }

        .hero-panel::before{
            width:200px;
            height:200px;
            top:24px;
            left:-40px;
            background:rgba(255,255,255,0.18);
        }

        .hero-panel::after{
            width:260px;
            height:260px;
            bottom:-80px;
            right:-80px;
            background:rgba(255,255,255,0.14);
        }

        .hero-content{
            max-width:340px;
            z-index:1;
        }

        .brand-logo{
            display:inline-flex;
            align-items:center;
            gap:14px;
            padding:12px 16px;
            border-radius:24px;
            background:rgba(255,255,255,0.12);
            margin-bottom:28px;
            color:#ffffff;
            font-weight:700;
        }


        .hero-content h1{
            font-size:3rem;
            line-height:1.05;
            margin-bottom:16px;
        }

        .hero-content p{
            font-size:1rem;
            line-height:1.8;
            color:#ffffffd9;
            margin-bottom:32px;
        }

        .container{
            padding:56px 48px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .card{
            width:100%;
            max-width:360px;
            margin:0 auto;
        }

        .card h2{
            font-size:1.75rem;
            margin-bottom:8px;
        }

        .card p{
            margin-bottom:32px;
            color:#1f2a44;
        }

        label{
            display:block;
            margin-bottom:10px;
            font-size:.95rem;
            font-weight:600;
            color:#374151;
        }

        input{
            width:100%;
            padding:16px 18px;
            margin-bottom:20px;
            border:1px solid #d1d5db;
            border-radius:16px;
            background:#f8fafc;
            font-size:1rem;
            color:#111827;
            transition:all .2s ease;
        }

        input:focus{
            outline:none;
            border-color:#cc3333;
            box-shadow:0 0 0 4px rgba(0, 51, 103, 0.16);
            background:#ffffff;
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            border-radius:16px;
            cursor:pointer;
            font-size:1rem;
            font-weight:700;
            color:#ffffff;
            background:linear-gradient(90deg, #cc3333 0%, #003367 100%);
            box-shadow:0 18px 30px rgba(0, 51, 103, 0.18);
            transition:transform .2s ease, box-shadow .2s ease;
        }

        button:hover{
            transform:translateY(-1px);
            box-shadow:0 22px 36px rgba(0, 51, 103, 0.22);
        }

        .error{
            color:#dc2626;
            text-align:center;
            margin-bottom:18px;
            font-size:.95rem;
        }

        @media (max-width:900px) {
            .page-wrapper{
                grid-template-columns:1fr;
                min-height:auto;
            }

            .hero-panel,
            .container{
                padding:36px 30px;
            }

            .hero-content h1{
                font-size:2.5rem;
            }
        }

        @media (max-width:560px) {
            body{
                padding:24px;
            }

            .hero-panel::before,
            .hero-panel::after{
                display:none;
            }

            .page-wrapper{
                border-radius:24px;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="back-home">← Back to Home</a>

<div class="page-wrapper">
    <section class="hero-panel">
        <div class="hero-content">
            <div class="brand-logo">
                <div class="brand-icon"></div>
            </div>
            <h1>Quennect</h1>
            <p>Premium Queue Management System for fast, modern service. Log in to manage orders, staff, and queue flow from one dashboard.</p>
        </div>
    </section>

    <section class="container">
        <div class="card">
            <h2>Welcome back</h2>
            <p>Enter your username and password to access the Quennect admin panel.</p>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form action="/login" method="POST">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" required>

                <label for="password">Password</label>
                <input id="password" type="password" name="password" required>

                <button type="submit">Login</button>
            </form>
        </div>
    </section>
</div>

</body>
</html>
