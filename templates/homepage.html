<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quennect - Queue Management System</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Inter, Arial, Helvetica, sans-serif;
        }

        body{
            overflow-x:hidden;
            
            background-color:#f4f7ff;
        }

        /* ============= NAVIGATION ============= */
        nav{
            display:flex;
            justify-content:flex-start;
            align-items:center;
            gap:28px;
            padding:20px 48px;
            background:#ffffff;
            box-shadow:0 2px 8px rgba(0,0,0,0.06);
            position:sticky;
            top:0;
            z-index:100;
        }

        .nav-logo{
            display:flex;
            align-items:center;
            gap:10px;
            font-size:1.4rem;
            font-weight:700;
            color:#000000;
        }

        .nav-icon{
            width:40px;
            height:40px;
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
            cursor:pointer;
            transition:transform .3s ease, box-shadow .3s ease;
        }

        .nav-icon::after{
            content:'';
            position:absolute;
            left:0;
            right:0;
            bottom:-8px;
            height:2px;
            width:0;
            background:#cc3333;
            border-radius:2px;
            transition:width .25s ease;
        }

        .nav-icon:hover{
            box-shadow:0 8px 20px rgba(0, 51, 103, 0.2);
        }

        .nav-links{
            display:flex;
            gap:24px;
            align-items:center;
            list-style:none;
            position:relative;
            z-index:2;
        }

        .nav-links a{
            text-decoration:none;
            color:#1f2937;
            font-size:.95rem;
            font-weight:500;
            transition:color .2s ease;
            cursor:pointer;
            position:relative;
            z-index:2;
        }

        .nav-links a:hover{
            color:#cc3333;
        }

        .nav-cta{
            display:flex;
            gap:12px;
            align-items:center;
            margin-left:auto;
        }

    

        .fb-icon{
            width:32px;
            height:32px;
            background:#cc3333;
            border-radius:8px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#ffffff;
            cursor:pointer;
            transition:background .2s ease;
            font-weight:700;
        }

        .fb-icon:hover{
            background:#002145;
        }

        .nav-links{
            display:flex;
            gap:24px;
            align-items:center;
            list-style:none;
            position:relative;
            z-index:2;
        }

        .nav-icon:hover{
            box-shadow:0 8px 20px rgba(0, 51, 103, 0.2);
        }

        /* ============= HERO SECTION ============= */
        .hero{
            background:linear-gradient(135deg, #cc3333 0%, #003367 100%);
            color:#ffffff;
            padding:120px 48px;
            position:relative;
            overflow:hidden;
            min-height:600px;
            display:flex;
            align-items:center;
            justify-content:space-between;
        }

        .hero::before{
            content:'';
            position:absolute;
            top:-100px;
            right:-100px;
            width:400px;
            height:400px;
            background:rgba(255,255,255,0.08);
            border-radius:50%;
            z-index:1;
        }

        .hero::after{
            content:'';
            position:absolute;
            bottom:-80px;
            left:-80px;
            width:300px;
            height:300px;
            background:rgba(255,255,255,0.06);
            border-radius:50%;
            z-index:1;
        }

        .hero-content{
            max-width:600px;
            z-index:2;
            position:relative;
        }

        .hero h1{
            font-size:3.5rem;
            line-height:1.15;
            margin-bottom:20px;
            font-weight:800;
        }

        .hero p{
            font-size:1.25rem;
            line-height:1.6;
            margin-bottom:40px;
            color:rgba(255,255,255,0.9);
        }

        .btn-trial{
            display:inline-block;
            padding:16px 32px;
            background:#ffffff;
            color:#cc3333;
            text-decoration:none;
            border-radius:8px;
            font-weight:700;
            font-size:1rem;
            cursor:pointer;
            border:none;
            transition:transform .2s ease, box-shadow .2s ease;
            box-shadow:0 12px 24px rgba(0,0,0,0.15);
        }

        .btn-trial:hover{
            transform:translateY(-2px);
            box-shadow:0 16px 32px rgba(0,0,0,0.2);
        }

        .hero-visual{
            z-index:2;
            position:relative;
            display:none;
        }

        /* ============= DECORATIVE ELEMENTS ============= */
        .decoration{
            position:absolute;
            opacity:0.15;
            z-index:1;
        }

        .deco-1{
            top:80px;
            right:100px;
            width:200px;
            height:200px;
            background:rgba(255,255,255,0.1);
            border-radius:50%;
        }

        /* ============= RESPONSIVE ============= */
        @media (max-width:900px) {
            nav{
                padding:16px 30px;
            }

            .nav-links{
                gap:20px;
                font-size:.9rem;
            }

            .hero{
                padding:80px 30px;
                justify-content:center;
                text-align:center;
            }

            .hero h1{
                font-size:2.5rem;
            }

            .hero p{
                font-size:1.1rem;
            }

            .hero-content{
                max-width:100%;
            }
        }

        @media (max-width:640px) {
            nav{
                padding:12px 20px;
                flex-direction:column;
                gap:12px;
            }

            .nav-links{
                flex-wrap:wrap;
                justify-content:center;
                gap:16px;
            }

            .hero{
                padding:60px 20px;
                min-height:auto;
            }

            .hero h1{
                font-size:2rem;
            }

            .hero p{
                font-size:1rem;
            }

            .btn-trial{
                padding:14px 28px;
                font-size:.95rem;
            }
        }
    </style>
</head>
<body>
<!-- NAVIGATION -->
<nav>
    <div class="nav-logo">
        <div class="nav-icon">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="width:40px; height:40px; object-fit:contain; border-radius:12px;">
        </div>
        Quennect
    </div>

    <ul class="nav-links">
        <li><a href="{{ url_for('home') }}">HOME</a></li>
        <li><a href="{{ url_for('about') }}">ABOUT</a></li>
        <li><a href="{{ url_for('team') }}">THE TEAM</a></li>
    </ul>

    <div class="nav-cta">
        <a href="https://www.facebook.com/profile.php?id=61589392364432" class="fb-icon" target="_blank" rel="noopener noreferrer">f</a>
    </div>
</nav>

<!-- HERO SECTION -->
<section class="hero">
    <div class="hero-content">
        <h1>Skip the wait.<br>Stay updated.</h1>
        <p>Get your queue status instantly through Messenger.</p>
        <a href="/login" class="btn-trial">Start Trial Now</a>
    </div>

    <div class="decoration deco-1"></div>
</section>

<script>
    let dragStartX = null;
    const dragZone = document.querySelector('.hero');

    dragZone.addEventListener('pointerdown', event => {
        dragStartX = event.clientX;
    });

    dragZone.addEventListener('pointermove', event => {
        if (dragStartX === null) return;
        const deltaX = event.clientX - dragStartX;
        if (Math.abs(deltaX) > 120) {
            const target = deltaX < 0
                ? "{{ url_for('about') }}"
                : "{{ url_for('team') }}";
            dragStartX = null;
            window.location.href = target;
        }
    });

    ['pointerup', 'pointerleave', 'pointercancel'].forEach(eventName => {
        dragZone.addEventListener(eventName, () => {
            dragStartX = null;
        });
    });
</script>

</body>
</html>
